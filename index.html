<!DOCTYPE html>
<html lang="ja">

<head>

<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>元素記号テスト</title>

<style>
body {
    font-family: sans-serif;
    background: #f0f0f0;
    padding: 10px;
}

.box {
    background: white;
    max-width: 600px;
    margin: auto;
    padding: 20px;
    border-radius: 10px;
}

#question {
    font-size: 24px;
    margin-bottom: 20px;
    min-height: 40px;
}

input {
    width: 100%;
    padding: 12px;
    font-size: 20px;
    box-sizing: border-box;
}

button {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    font-size: 18px;
}

#result {
    margin-top: 15px;
    font-size: 22px;
}
</style>
</head>
<body>

<div class="box">

<h2>元素記号テスト</h2>

<select id="csvSelect">
<option value="questions.csv">元素</option>
<option value="english.csv">英単語</option>
<option value="history.csv">歴史</option>
</select>

<button id="changeCsvBtn">
科目変更
</button>


<div id="question">準備中...</div>

<input type="text" id="answer">

<button id="checkBtn">答え合わせ</button>
<button id="nextBtn">次の問題</button>
<button id="reviewBtn">
ミス問題復習
</button>

<div id="result"></div>
<div id="score"></div>
<div id="best"></div>

<h3>苦手問題ランキング</h3>
<div id="weak"></div>

<h3>学習履歴</h3>
<div id="history"></div>

</div>

<script>

var questions = [];

function loadCSV() {

var csvFile =
document.getElementById('csvSelect').value;

fetch(csvFile)


.then(function(response) {

    if(!response.ok) {

        document.getElementById('question')
        .textContent =
        'questions.csv が見つかりません';

        return '';
    }

    return response.text();

})


    .then(function(text) {

        var lines = text.split('\n');

        for(var i = 0; i < lines.length; i++) {

            var line = lines[i].trim();

            if(line === '') {
                continue;
            }

            var parts = line.split(',');

            if(parts.length >= 2) {

questions.push({
    question: parts[0].trim(),
    answer: parts[1].trim()
});
            }
        }

if(questions.length === 0) {

    document.getElementById('question')
    .textContent =
    '問題0件';

    return;
}

shuffleQuestions();

showQuestion();

updateScore();
    })

    .catch(function(error) {

        document.getElementById('question')
        .textContent =
        'CSV読込失敗';
    });
}

var index = 0;

var score = 0;
var total = 0;

var bestScore = 0;
var weakData = {};
var historyData = [];
function saveHistory() {

historyData.unshift(

    stamp
    + ' '
    + score
    + '/'
    + total
);

    if(historyData.length > 10) {

        historyData.pop();
    }

    var html = '';

    for(var i = 0; i < historyData.length; i++) {

        html += historyData[i] + '<br>';
    }

    document.getElementById('history')
    .innerHTML = html;
}

var weakData = {};
var reviewMode = false;

function shuffleQuestions() {

    for(var i = questions.length - 1; i > 0; i--) {

        var j = Math.floor(Math.random() * (i + 1));

        var temp = questions[i];

        questions[i] = questions[j];

        questions[j] = temp;
    }
}

function showQuestion() {

    document.getElementById('question').textContent =
    questions[index].question;

    document.getElementById('answer').value = '';

    document.getElementById('result').textContent = '';
}

function checkAnswer() {

    var user =
    document.getElementById('answer').value;

    total++;

    if(user.toLowerCase() ==
       questions[index].answer.toLowerCase()) {

        score++;

        document.getElementById('result').textContent =
        '⭕ 正解';

    } else {

        document.getElementById('result').textContent =
        '❌ 正解: ' + questions[index].answer;
var q = questions[index].question;

if(!weakData[q]) {

    weakData[q] = 0;
}

weakData[q]++;
    }

    updateScore();
    saveHistory();
}


function nextQuestion() {

    var list = [];

    if(reviewMode) {

        for(var i = 0; i < questions.length; i++) {

            var q = questions[i].question;

            if(weakData[q]) {

                list.push(i);
            }
        }

        if(list.length === 0) {

            alert('ミス問題なし');

            reviewMode = false;

            return;
        }

        index =
        list[Math.floor(Math.random() * list.length)];

    } else {

        var oldIndex = index;

        while(index === oldIndex) {

            index =
            Math.floor(Math.random() * questions.length);
        }
    }

    showQuestion();
}


function updateScore() {

    var rate = 0;

    if(total > 0) {

        rate = Math.round(score / total * 100);
    }

    document.getElementById('score').textContent =

        (index + 1)
        + ' / '
        + questions.length
        + ' 正解率: '
        + rate
        + '%';
}



window.onload = function() {

    document.getElementById('checkBtn')
    .addEventListener('click', checkAnswer);

    document.getElementById('nextBtn')
    .addEventListener('click', nextQuestion);

    document.getElementById('reviewBtn')
    .addEventListener('click', function() {

        reviewMode = true;

        nextQuestion();
    });

    document.getElementById('answer')
    .addEventListener('keypress', function(e) {

        if(e.key === 'Enter') {

            checkAnswer();
        }
    });
document.getElementById('changeCsvBtn')
.addEventListener('click', function() {

    questions = [];

    index = 0;

    loadCSV();
});

    loadCSV();

};

</script>


</body>
</html>
