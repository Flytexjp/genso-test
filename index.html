<!DOCTYPE html>
<html lang="ja">

<head>

<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>元素記号テスト</title>

<style>
body {
    font-family: sans-serif;
    background: #f0f0f0;
    padding: 10px;
}

.box {
    background: white;
    max-width: 600px;
    margin: auto;
    padding: 20px;
    border-radius: 10px;
}

#question {
    font-size: 24px;
    margin-bottom: 20px;
    min-height: 40px;
}

input {
    width: 100%;
    padding: 12px;
    font-size: 20px;
    box-sizing: border-box;
}

button {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    font-size: 18px;
}

#result {
    margin-top: 15px;
    font-size: 22px;
}
</style>
</head>
<body>

<div class="box">

<h2>元素記号テスト</h2>

<select id="csvSelect">
<option value="questions.csv">元素</option>
<option value="english.csv">英単語</option>
<option value="social.csv">社会</option>
<option value="social_01.csv">社会-01調査の手法</option>
<option value="social_02.csv">社会-02地図記号</option>
<option value="social_03.csv">社会-0３日本の地域的特色①</option>
<option value="social_04.csv">社会-歴史(武士の政権の成立)</option>

<option value="science.csv">理科</option>
<option value="language.csv">国語</option>
<option value="333.csv">その他-03</option>
<option value="444.csv">その他-04</option>
<option value="555.csv">その他-05</option>
</select>

<button id="changeCsvBtn">
科目変更
</button>


<div id="question">準備中...</div>

<img id="questionImage"
     style="max-width:100%;
            display:none;
            cursor:pointer;">

<input type="text" id="answer">

<button id="checkBtn">答え合わせ</button>
<button id="nextBtn">次の問題</button>
<button id="reviewBtn">
ミス問題復習
</button>

<div id="result"></div>
<div id="score"></div>
<div id="best"></div>

<h3>苦手問題ランキング</h3>
<div id="weak"></div>

<h3>学習履歴</h3>
<div id="history"></div>

</div>

<script>

var questions = [];

function loadCSV() {

var csvFile =
document.getElementById('csvSelect').value;

fetch(csvFile)


.then(function(response) {

    if(!response.ok) {

        document.getElementById('question')
        .textContent =
        'questions.csv が見つかりません';

        return '';
    }

    return response.text();

})


    .then(function(text) {

        var lines = text.split('\n');

        for(var i = 0; i < lines.length; i++) {

            var line = lines[i].trim();

            if(line === '') {
                continue;
            }

            var parts = line.split(',');

            if(parts.length >= 2) {

questions.push({

    question: parts[0].trim(),

    answer: parts[1].trim(),

    image:
    parts.length >= 3
    ? parts[2].trim()
    : ''

});
            }
        }

if(questions.length === 0) {

    document.getElementById('question')
    .textContent =
    '問題0件';

    return;
}

shuffleQuestions();

showQuestion();

updateScore();
    })

    .catch(function(error) {

        document.getElementById('question')
        .textContent =
        'CSV読込失敗';
    });
}

var index = 0;

var score = 0;
var total = 0;

var bestScore = 0;
var weakData = {};
var historyData = [];


function saveHistory() {

    var d = new Date();

    var stamp =

        (d.getMonth() + 1)
        + '/'
        + d.getDate()
        + ' '
        + d.getHours()
        + ':'
        + ('0' + d.getMinutes()).slice(-2);

historyData.unshift(

    stamp
    + ' '
    + score
    + '/'
    + total
);

    if(historyData.length > 10) {

        historyData.pop();
    }

    var html = '';

    for(var i = 0; i < historyData.length; i++) {

        html += historyData[i] + '<br>';
    }

    document.getElementById('history')
    .innerHTML = html;

localStorage.setItem(

    'historyData',

    JSON.stringify(historyData)
);

}

var weakData = {};
var reviewMode = false;

function shuffleQuestions() {

    for(var i = questions.length - 1; i > 0; i--) {

        var j = Math.floor(Math.random() * (i + 1));

        var temp = questions[i];

        questions[i] = questions[j];

        questions[j] = temp;
    }
}

function showQuestion() {

    document.getElementById('question').textContent =
    questions[index].question;

    var img =
    document.getElementById('questionImage');

    if(questions[index].image) {

        img.src =
        'images/' +
        questions[index].image;

        img.style.display = 'block';

    } else {

        img.style.display = 'none';
    }

    document.getElementById('answer').value = '';

    document.getElementById('result').textContent = '';
}

function checkAnswer() {

    var user =
    document.getElementById('answer').value;

    total++;

    if(user.toLowerCase() ==
       questions[index].answer.toLowerCase()) {

        score++;

        document.getElementById('result').textContent =
        '⭕ 正解';

    } else {

        document.getElementById('result').textContent =
        '❌ 正解: ' + questions[index].answer;
var q = questions[index].question;

if(!weakData[q]) {

    weakData[q] = 0;
}

weakData[q]++;
    }

    updateScore();
    saveHistory();
}


function nextQuestion() {

    var list = [];

    if(reviewMode) {

        for(var i = 0; i < questions.length; i++) {

            var q = questions[i].question;

            if(weakData[q]) {

                list.push(i);
            }
        }

        if(list.length === 0) {

            alert('ミス問題なし');

            reviewMode = false;

            return;
        }

        index =
        list[Math.floor(Math.random() * list.length)];

    } else {

        var oldIndex = index;

        while(index === oldIndex) {

            index =
            Math.floor(Math.random() * questions.length);
        }
    }

    showQuestion();
}


function updateScore() {

    var rate = 0;

    if(total > 0) {

        rate = Math.round(score / total * 100);
    }

    document.getElementById('score').textContent =

        (index + 1)
        + ' / '
        + questions.length
        + ' 正解率: '
        + rate
        + '%';
}



window.onload = function() {

var saved =

localStorage.getItem('historyData');

if(saved) {

    historyData =
    JSON.parse(saved);

    document.getElementById('history')
    .innerHTML =
    historyData.join('<br>');
}

    document.getElementById('checkBtn')
    .addEventListener('click', checkAnswer);

    document.getElementById('nextBtn')
    .addEventListener('click', nextQuestion);

    document.getElementById('reviewBtn')
    .addEventListener('click', function() {

        reviewMode = true;

        nextQuestion();
    });

    document.getElementById('answer')
    .addEventListener('keypress', function(e) {

        if(e.key === 'Enter') {

            checkAnswer();
        }
    });
document.getElementById('changeCsvBtn')
.addEventListener('click', function() {

    questions = [];

    index = 0;

    loadCSV();
});

document.getElementById('questionImage')
.addEventListener('click', function() {

    window.open(this.src);
});

    loadCSV();

};

</script>


</body>
</html>
